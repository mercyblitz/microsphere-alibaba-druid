# This workflow automatically syncs the 'main' branch with the upstream repository
# on a daily schedule and can also be triggered manually.

name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    name: Sync from upstream
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/microsphere-projects/microsphere-alibaba-druid.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Sync main branch with upstream
        run: |
          git checkout main
          if git merge --no-ff upstream/main -m "chore: sync upstream main [skip ci]"; then
            git push origin main
            echo "Successfully synced main with upstream."
          else
            echo "::error::Merge conflict detected when syncing upstream/main into main. Manual intervention required."
            git merge --abort
            exit 1
          fi
